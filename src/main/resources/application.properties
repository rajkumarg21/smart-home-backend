spring.application.name=smart-home

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=jdbc:mysql://localhost:3306/smart_home?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=mysql

# ── JWT ───────────────────────────────────────────────────────────────────────
# Generate a strong Base64-encoded secret (≥ 256 bits / 32 bytes).
# Example command: openssl rand -base64 32
app.jwt.secret=dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS1mb3Itc21hcnQtaG9tZS1hcHAh
# Token TTL: 24 hours in milliseconds
app.jwt.expiration-ms=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.authentication=TRACE
